    --text-muted: #4b5563;
    --text-subtle: #6b7280;
    --border: #d9dee5;
    --border-strong: #c3cad4;
    --accent: #1d5fd6;
    --accent-text: #0d3f9e;

    --chip-active-bg: #1d5fd6;

      --chip-active-text: #0b1220;
      --tag-bg: #1e2530;
      --tag-text: #c3cbd8;

    --bg-sunken: #eef0f3;
    --text: #14181f;
    --text-muted: #4b5563;
    --text-subtle: #6b7280;
    --border: #d9dee5;
    --border-strong: #c3cad4;
    --accent: #1d5fd6;
    --accent-text: #0d3f9e;
    --accent-bg: #e8effd;
    --chip-bg: #ffffff;
    --chip-active-bg: #1d5fd6;
    --chip-active-text: #ffffff;
    --tag-bg: #eef1f6;
    --tag-text: #33404f;
    --shadow: 0 1px 2px rgba(15, 23, 42, 0.06), 0 1px 1px rgba(15, 23, 42, 0.04);
    --shadow-hover: 0 8px 20px rgba(15, 23, 42, 0.10), 0 2px 6px rgba(15, 23, 42, 0.06);
    --focus-ring: #1d5fd6;
    color-scheme: light;
  }

  :root[data-theme="dark"] {
    --bg: #0f1319;
    --bg-elevated: #171c24;
    --bg-sunken: #10141a;
    --text: #e8ebf0;
    --text-muted: #aab2c0;
    --text-subtle: #838d9d;
    --border: #2a313d;
    --border-strong: #3a4351;
    --accent: #6fa2ff;
    --accent-text: #9dc0ff;
    --accent-bg: #1a2740;
    --chip-bg: #171c24;
    --chip-active-bg: #6fa2ff;
    --chip-active-text: #0b1220;
    --tag-bg: #1e2530;
    --tag-text: #c3cbd8;
    --shadow: 0 1px 2px rgba(0, 0, 0, 0.4), 0 1px 1px rgba(0, 0, 0, 0.3);

    --focus-ring: #8fb6ff;
    color-scheme: dark;
  }

  * { box-sizing: border-box; }

  html, body {
    max-width: 100%;
    overflow-x: hidden;
  }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji";
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  a { color: inherit; }

  .wrap {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 20px;
  }

  header.site-header {
    padding: 40px 0 28px;
    border-bottom: 1px solid var(--border);
    position: relative;
  }

  .theme-toggle {
    position: absolute;
    top: 40px;
    right: 20px;
    background: var(--bg-elevated);
    border: 1px solid var(--border-strong);
    color: var(--text);
    border-radius: 999px;
    padding: 8px 14px;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    box-shadow: var(--shadow);
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .theme-toggle:hover { border-color: var(--accent); }

  h1 {
    margin: 0 0 8px;
    font-size: clamp(1.6rem, 3.4vw, 2.3rem);
    font-weight: 800;
    letter-spacing: -0.02em;
    max-width: 80%;
  }

  .tagline {
    margin: 0 0 18px;
    color: var(--text-muted);
    font-size: 1.02rem;
    max-width: 62ch;
  }

  .meta-row {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }

  .meta-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--accent-bg);
    color: var(--accent-text);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 6px 14px;
    font-size: 0.85rem;
    font-weight: 600;
  }

  .controls {
    position: sticky;
    top: 0;
    z-index: 20;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 14px 0;
  }

  .controls-inner {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: center;
  }

  .search-box {
    flex: 1 1 260px;
    min-width: 200px;
    position: relative;
  }

  .search-box input {
    width: 100%;
    padding: 10px 14px 10px 36px;
    border-radius: 10px;
    border: 1px solid var(--border-strong);
    background: var(--bg-elevated);
    color: var(--text);
    font-size: 0.95rem;
  }

  .search-box::before {
    content: "🔎";
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 0.85rem;
    opacity: 0.7;
    pointer-events: none;
  }

  .search-box input:focus-visible,
  select:focus-visible,
  .chip:focus-visible,
  .theme-toggle:focus-visible,
  a.card:focus-visible {
    outline: 3px solid var(--focus-ring);
    outline-offset: 2px;
  }

  select#sort {
    padding: 10px 14px;
    border-radius: 10px;
    border: 1px solid var(--border-strong);
    background: var(--bg-elevated);
    color: var(--text);
    font-size: 0.9rem;
    font-weight: 600;
  }

  .chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 12px 0 2px;
  }

  .chip {
    border: 1px solid var(--border-strong);
    background: var(--chip-bg);
    color: var(--text);
    border-radius: 999px;
    padding: 6px 13px;
    font-size: 0.82rem;
    font-weight: 600;
    cursor: pointer;
  }

  .chip[aria-pressed="true"] {
    background: var(--chip-active-bg);
    color: var(--chip-active-text);
    border-color: var(--chip-active-bg);
  }

  .chip:hover { border-color: var(--accent); }

  main { padding: 30px 0 10px; }

  .category-section { margin-bottom: 44px; }

  .category-head {
    display: flex;
    align-items: baseline;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 6px;
  }

  .category-head h2 {
    font-size: 1.3rem;
    margin: 0;
    letter-spacing: -0.01em;
  }

  .count-badge {
    background: var(--tag-bg);
    color: var(--text-muted);
    border-radius: 999px;
    padding: 2px 10px;
    font-size: 0.78rem;
    font-weight: 700;
  }

  .category-blurb {
    margin: 0 0 18px;
    color: var(--text-subtle);
    font-size: 0.92rem;
    max-width: 80ch;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
    gap: 16px;
  }

  @media (max-width: 560px) {
    .grid { grid-template-columns: 1fr; }
  }

  a.card {
    display: flex;
    flex-direction: column;
    gap: 10px;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px 18px;
    text-decoration: none;
    color: var(--text);
    box-shadow: var(--shadow);
    transition: box-shadow 0.15s ease, transform 0.15s ease, border-color 0.15s ease;
  }

  a.card:hover {
    box-shadow: var(--shadow-hover);
    border-color: var(--accent);
    transform: translateY(-2px);
  }

  .card-name {
    margin: 0;
    font-size: 1.05rem;
    font-weight: 700;
    color: var(--accent-text);
    text-decoration: underline;
    text-decoration-color: transparent;
  }
  a.card:hover .card-name,
  a.card:focus-visible .card-name {
    text-decoration-color: currentColor;
  }

  .card-repo {
    font-size: 0.78rem;
    color: var(--text-subtle);
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    margin-top: -6px;
  }

  .card-desc {
    font-size: 0.88rem;
    color: var(--text-muted);
    margin: 0;
    flex-grow: 1;
  }

  .card-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .tag {
    background: var(--tag-bg);
    color: var(--tag-text);
    font-size: 0.72rem;
    font-weight: 600;
    padding: 4px 9px;
    border-radius: 7px;
    line-height: 1.3;
  }

  .card-stats {
    display: flex;
    flex-wrap: wrap;
    gap: 8px 14px;
    font-size: 0.78rem;
    color: var(--text-subtle);
    border-top: 1px solid var(--border);
    padding-top: 10px;
    margin-top: 2px;
  }

  .card-stats span { white-space: nowrap; }

  .empty-state {
    text-align: center;
    color: var(--text-subtle);
    padding: 60px 0;
    font-size: 0.95rem;
  }

  footer.site-footer {
    border-top: 1px solid var(--border);
    padding: 26px 0 40px;
    color: var(--text-subtle);
    font-size: 0.85rem;
  }

  footer.site-footer a {
    color: var(--accent-text);
    font-weight: 600;
    text-decoration: underline;
  }

  .visually-hidden {
    position: absolute;
    width: 1px; height: 1px;
    padding: 0; margin: -1px;
    overflow: hidden;
    clip: rect(0,0,0,0);
    white-space: nowrap;
    border: 0;
  }
</style>
</head>

  // ---------- helpers ----------

  function formatStars(n) {
    if (n >= 1000) {
      var v = n / 1000;
      var s = (Math.round(v * 10) / 10).toFixed(1);
      if (s.endsWith(".0")) s = s.slice(0, -2);
      return s + "k";
    }
    return String(n);
  }

  function el(tag, opts) {
    var node = document.createElement(tag);
    opts = opts || {};
    if (opts.className) node.className = opts.className;
    if (opts.text !== undefined) node.textContent = opts.text;
    if (opts.attrs) {
      for (var k in opts.attrs) node.setAttribute(k, opts.attrs[k]);
    }
    return node;
  }

  // ---------- theme ----------

  var root = document.documentElement;
  var themeToggle = document.getElementById("themeToggle");
  var themeIcon = document.getElementById("themeToggleIcon");
  var themeLabel = document.getElementById("themeToggleLabel");
  var THEME_KEY = "osint-dashboard-theme";

  function systemPrefersDark() {
    return window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
  }

  function currentTheme() {
    var stored = localStorage.getItem(THEME_KEY);
    if (stored === "light" || stored === "dark") return stored;
    return systemPrefersDark() ? "dark" : "light";
  }

  function applyTheme(theme) {
    root.setAttribute("data-theme", theme);
    var showingDark = theme === "dark";
    themeIcon.textContent = showingDark ? "☀️" : "🌙";
    themeLabel.textContent = showingDark ? "Light" : "Dark";
    themeToggle.setAttribute("aria-pressed", String(showingDark));
  }

  applyTheme(currentTheme());

  themeToggle.addEventListener("click", function () {
    var next = root.getAttribute("data-theme") === "dark" ? "light" : "dark";
    localStorage.setItem(THEME_KEY, next);
    applyTheme(next);
  });

  // ---------- state ----------

  var state = {
    search: "",
    sort: "stars",
    category: "All"
  };

  // ---------- header meta ----------

  document.getElementById("toolCountPill").textContent = DATA.totalTools + " tools";

  // ---------- chips ----------

  var chipRow = document.getElementById("chipRow");
  var chipNames = ["All"].concat(DATA.categories.map(function (c) { return c.name; }));

  chipNames.forEach(function (name) {
    var chip = el("button", { className: "chip", text: name, attrs: {
      type: "button",
      "aria-pressed": name === "All" ? "true" : "false",
      "aria-label": "Filter by category: " + name
    } });
    chip.addEventListener("click", function () {
      state.category = name;
      Array.prototype.forEach.call(chipRow.children, function (c) {
        c.setAttribute("aria-pressed", c === chip ? "true" : "false");
      });
      render();
    });
    chipRow.appendChild(chip);
  });

  // ---------- search + sort ----------

  var searchInput = document.getElementById("searchInput");
  var sortSelect = document.getElementById("sort");

  searchInput.addEventListener("input", function () {
    state.search = searchInput.value.trim().toLowerCase();
    render();
  });

  sortSelect.addEventListener("change", function () {
    state.sort = sortSelect.value;
    render();
  });

  // ---------- card builder ----------

  function buildCard(tool, categoryName) {
    var url = "https://github.com/" + tool.repo;
    var card = el("a", { className: "card", attrs: {
      href: url,
      target: "_blank",
      rel: "noopener noreferrer",
      "aria-label": tool.name + " on GitHub — " + categoryName
    } });

    var name = el("h3", { className: "card-name", text: tool.name });
    var repo = el("div", { className: "card-repo", text: tool.repo });
    var desc = el("p", { className: "card-desc", text: tool.description });

    var tags = el("div", { className: "card-tags" });
    (tool.keyFeatures || []).slice(0, 4).forEach(function (f) {
      tags.appendChild(el("span", { className: "tag", text: f }));
    });

    var stats = el("div", { className: "card-stats" });
    stats.appendChild(el("span", { text: "★ " + formatStars(tool.stars) }));
    stats.appendChild(el("span", { text: tool.language }));
    stats.appendChild(el("span", { text: tool.license }));
    stats.appendChild(el("span", { text: "updated " + tool.lastPushed }));

    card.appendChild(name);
    card.appendChild(repo);
    card.appendChild(desc);
    card.appendChild(tags);
    card.appendChild(stats);

    return card;
  }

  // ---------- render ----------

  var main = document.getElementById("main");

  function matchesSearch(tool, categoryName, query) {
    if (!query) return true;
    var haystack = (tool.name + " " + tool.description + " " + categoryName).toLowerCase();
    return haystack.indexOf(query) !== -1;
  }

  function sortTools(tools, mode) {
    var copy = tools.slice();
    if (mode === "alpha") {
      copy.sort(function (a, b) { return a.name.localeCompare(b.name); });
    } else {
      copy.sort(function (a, b) { return b.stars - a.stars; });
    }
    return copy;
  }

  function render() {
    main.innerHTML = "";
    var anyRendered = false;

    DATA.categories.forEach(function (cat) {
      if (state.category !== "All" && state.category !== cat.name) return;

      var filtered = cat.tools.filter(function (t) {
        return matchesSearch(t, cat.name, state.search);
      });

      if (filtered.length === 0) return;

      anyRendered = true;
      var sorted = sortTools(filtered, state.sort);

      var section = el("section", { className: "category-section", attrs: {
        "aria-label": cat.name
      } });

      var head = el("div", { className: "category-head" });
      head.appendChild(el("h2", { text: cat.name }));
      head.appendChild(el("span", { className: "count-badge", text: String(sorted.length) }));
      section.appendChild(head);
      section.appendChild(el("p", { className: "category-blurb", text: cat.blurb }));

      var grid = el("div", { className: "grid" });
      sorted.forEach(function (tool) {
        grid.appendChild(buildCard(tool, cat.name));
      });
      section.appendChild(grid);

      main.appendChild(section);
    });

    if (!anyRendered) {
      main.appendChild(el("p", { className: "empty-state", text: "No tools match your search and filters." }));
    }
  }

  render();
})();
</script>

</body>
</html>
